name: Windows

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        configuration: [RiotGamesServers, ChinaServer]
    steps:
    - uses: actions/checkout@v4 
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Build 
      shell: cmd
      run: msbuild R3nzSkin/R3nzSkin.vcxproj /p:Platform=x64 /p:Configuration=${{ matrix.configuration }}

    - name: Find Output Files
      shell: cmd
      run: |
          dir /s /b Release\${{ matrix.configuration }}\*
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Release\${{ matrix.configuration }}
        path: D:\a\R3nzSkin\R3nzSkin\R3nzSkin\Release\Release\${{ matrix.configuration }}\*
