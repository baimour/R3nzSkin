name: Windows
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        configuration: [RiotGamesServers, ChinaServer]
    steps:
    - uses: actions/checkout@latest
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Build 
      shell: cmd
      run: msbuild R3nzSkin.sln /p:Platform=x64 /p:Configuration=${{ matrix.configuration }}
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: R3nzSkin
        path: |
            ${{ github.workspace }}/Release/${{ matrix.configuration }}/*.dll
            ${{ github.workspace }}/Release/${{ matrix.configuration }}/*.exe
